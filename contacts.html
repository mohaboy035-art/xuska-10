<form action="#" method="POST" class="gym-form">
                
            
                <fieldset>
                    <legend>Personal Information</legend>
                    
                    <div class="form-group">
                        <label for="fullname">Full Name:</label>
                        <input type="text" id="fullname" name="fullname" required placeholder="Gali magacaaga oo buuxa">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address:</label>
                        <input type="email" id="email" name="email" required placeholder="tusaale@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone Number:</label>
                        <input type="tel" id="phone" name="phone" required placeholder="Gali lambarkaaga telifoonka">
                    </div>

                    <div class="form-group-inline">
                        <label class="label-inline">Gender:</label>
                        <input type="radio" id="male" name="gender" value="male" checked>
                        <label for="male" style="margin-right: 10px;">Male</label>
                        
                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female">Female</label>
                    </div>
                </fieldset>

        
                <fieldset>
                    <legend>Membership Details</legend>
                    
                    <div class="form-group">
                        <label for="plan">Choose your Plan:</label>
                        <select id="plan" name="plan">
                            <option value="basic">Basic Plan - $15/Month</option>
                            <option value="standard">Standard Plan - $25/Month</option>
                            <option value="vip">VIP Premium - $50/Month</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="comments">Health Goals or Comments:</label>
                        <textarea id="comments" name="comments" rows="4" placeholder="Maxay tahay yoolkaaga caafimaad ama fariin aad rabto inaad noo reebto?"></textarea>
                    </div>
                </fieldset>

            
                <button type="submit" class="btn-submit">Gudbi Codsiga</button>
            </form>
